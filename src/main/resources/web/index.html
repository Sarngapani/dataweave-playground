<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>DataWeave Playground</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<style>
/* ================= COFORGE ENTERPRISE PALETTE ================= */
:root{
  /* Brand */
  --coforge-orange:#F15A29;
  --coforge-navy:#0A2240;

  /* Surfaces */
  --bg:#F8FAFC;
  --editor:#FFFFFF;
  --title:#F1F5F9;
  --border:#D1D5DB;

  /* Text */
  --text-primary:#0A2240;
  --text-muted:#475569;

  /* Actions */
  --primary:#0A2240;
  --primary-hover:#06162D;

  /* Status */
  --success:#16a34a;
  --error:#dc2626;

  --mono:ui-monospace,Menlo,Consolas,"Liberation Mono",monospace;
}

/* ================= DARK MODE ================= */
body.dark{
  --bg:#0B1220;
  --editor:#020617;
  --title:#020617;
  --border:#1E293B;

  --text-primary:#E5E7EB;
  --text-muted:#9CA3AF;

  --primary:#F15A29;
  --primary-hover:#C4451F;
}

/* ================= BASE ================= */
*{box-sizing:border-box}
html,body{
  height:100%;
  margin:0;
  background:var(--bg);
  font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text-primary);
}
body{display:flex;flex-direction:column}

/* ================= HEADER ================= */
header{
  height:44px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  padding:0 14px;
  background:var(--editor);
  border-bottom:1px solid var(--border);
}

.header-left{
  font-weight:700;
  font-size:14px;
}
.header-left .c{color:var(--coforge-orange)}

.header-center{
  text-align:center;
  font-weight:600;
  font-size:14px;
}

.header-right{
  display:flex;
  gap:8px;
}

header button{
  height:28px;
  font-size:12px;
  border:1px solid var(--border);
  border-radius:6px;
  padding:0 10px;
  background:var(--editor);
  cursor:pointer;
  color:var(--text-primary);
}
header button:hover{
  border-color:var(--coforge-orange);
  color:var(--coforge-orange);
}

/* ================= LAYOUT ================= */
main{
  flex:1;
  display:flex;
  min-height:0;
}

.col{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  background:var(--editor);
}

.panel-title{
  height:34px;
  display:flex;
  align-items:center;
  padding:0 10px;
  background:var(--title);
  border-bottom:1px solid var(--border);
  font-size:12px;
  font-weight:600;
}

.editor{flex:1;min-height:0}

textarea,pre{
  width:100%;
  height:100%;
  border:0;
  outline:none;
  padding:12px;
  font-family:var(--mono);
  font-size:13px;
  line-height:1.6;
  background:var(--editor);
  color:inherit;
  resize:none;
}
pre{margin:0;white-space:pre;overflow:auto}

.toolbar{
  height:40px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 8px;
  border-top:1px solid var(--border);
}

button.primary{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}
button.primary:hover{background:var(--primary-hover)}

.status{margin-left:auto;font-size:12px}
.ok{color:var(--success)}
.err{color:var(--error)}

.copy-btn{
  margin-left:auto;
  height:22px;
  font-size:11px;
  border-radius:4px;
}

/* Resizer */
.gutter{
  width:6px;
  cursor:col-resize;
  background:#E5E7EB;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
}

/* ================= API DRAWER ================= */
.api-drawer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:60vh;
  background:var(--editor);
  border-top:1px solid var(--border);
  transform:translateY(100%);
  transition:transform .3s ease;
  display:flex;
  flex-direction:column;
  z-index:1000;
}
.api-drawer.open{transform:translateY(0)}

.api-drawer-header{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}
.api-drawer-body{flex:1;min-height:0}
.api-iframe{width:100%;height:100%;border:none}
</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <div class="header-left">
    <span class="c">C</span>oforge
  </div>

  <div class="header-center">
    DataWeave Playground
  </div>

  <div class="header-right">
    <button onclick="openApi()">API Reference</button>
    <button id="themeToggle">🌙</button>
  </div>
</header>

<!-- ================= MAIN ================= -->
<main>

  <!-- PAYLOAD -->
  <section class="col">
    <div class="panel-title">PAYLOAD</div>
    <div class="editor">
      <textarea id="input">{ "message": "Hello world!" }</textarea>
    </div>
    <div class="toolbar">
      <label>Input MIME:</label>
      <select id="inputMime">
        <option value="application/json">application/json</option>
        <option value="application/xml">application/xml</option>
        <option value="application/csv">application/csv</option>
        <option value="application/yaml">application/yaml</option>
        <option value="text/plain">text/plain</option>
      </select>
    </div>
  </section>

  <div class="gutter"></div>

  <!-- SCRIPT -->
  <section class="col">
    <div class="panel-title">
      SCRIPT
      <button class="copy-btn" onclick="copyText('script',this)">Copy</button>
    </div>
    <div class="editor">
      <textarea id="script">%dw 2.0
output application/json
---
payload</textarea>
    </div>
    <div class="toolbar">
      <button class="primary" id="runBtn">Run ▶</button>
      <div class="status" id="status">Ready</div>
    </div>
  </section>

  <div class="gutter"></div>

  <!-- OUTPUT -->
  <section class="col">
    <div class="panel-title">
      OUTPUT
      <button class="copy-btn" onclick="copyText('output',this)">Copy</button>
    </div>
    <div class="editor">
      <pre id="output"></pre>
    </div>
    <div class="toolbar">
      <small>Rendered locally</small>
    </div>
  </section>

</main>

<!-- ================= API DRAWER ================= -->
<div id="apiDrawer" class="api-drawer">
  <div class="api-drawer-header">
    <span>API Reference</span>
    <button onclick="closeApi()">✕</button>
  </div>
  <div class="api-drawer-body">
    <iframe class="api-iframe" src="/docs"></iframe>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const scriptEl = $('#script');

function toBase64Utf8(str){
  const b=new TextEncoder().encode(str);
  let r=""; b.forEach(x=>r+=String.fromCharCode(x));
  return btoa(r);
}

function prettyJson(t){try{return JSON.stringify(JSON.parse(t),null,2)}catch{return t}}
function prettyXml(x){
  try{
    x=x.replace(/(>)(<)(\/*)/g,'$1\n$2$3');
    let p=0,o='';
    x.split('\n').forEach(n=>{
      if(n.match(/^<\/\w/))p--;
      o+='  '.repeat(p)+n+'\n';
      if(n.match(/^<\w[^>]*[^\/]>$/))p++;
    });
    return o.trim();
  }catch{return x}
}
function prettyYaml(t){return t.trim()}
function prettyCsv(t){return t.replace(/\r\n/g,'\n').trim()}

async function runPlayground(){
  const st=$('#status'), out=$('#output');
  st.textContent='Running...'; st.className='';
  try{
    const r=await fetch('/api/run',{
      method:'POST',
      headers:{
        'Content-Type':$('#inputMime').value,
        'dw-script-b64':toBase64Utf8(scriptEl.value)
      },
      body:$('#input').value
    });
    const ct=(r.headers.get('content-type')||'').toLowerCase();
    const t=await r.text();
    out.textContent=
      ct.includes('json')?prettyJson(t):
      ct.includes('xml')||t.trim().startsWith('<')?prettyXml(t):
      ct.includes('yaml')?prettyYaml(t):
      ct.includes('csv')?prettyCsv(t):t;
    st.textContent='Success'; st.className='ok';
  }catch(e){
    out.textContent=String(e);
    st.textContent='Error'; st.className='err';
  }
}

let timer=null;
['input','script'].forEach(id=>{
  $('#'+id).addEventListener('input',()=>{
    clearTimeout(timer);
    timer=setTimeout(runPlayground,500);
  });
});
$('#runBtn').onclick=runPlayground;

function copyText(id,btn){
  const el=$('#'+id);
  navigator.clipboard.writeText(el.value||el.innerText);
  btn.textContent='Copied!';
  setTimeout(()=>btn.textContent='Copy',1000);
}

const toggle=$('#themeToggle');
const setTheme=m=>{
  document.body.classList.toggle('dark',m==='dark');
  localStorage.setItem('theme',m);
};
toggle.onclick=()=>setTheme(document.body.classList.contains('dark')?'light':'dark');
setTheme(localStorage.getItem('theme')||'light');

const apiDrawer=$('#apiDrawer');
function openApi(){apiDrawer.classList.add('open')}
function closeApi(){apiDrawer.classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeApi()});
</script>

</body>
</html>
