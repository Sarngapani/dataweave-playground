<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>DataWeave Playground · Coforge</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ================= DESIGN TOKENS ================= */
:root {
  --orange:     #F15A29;
  --orange-dim: #c8461e;
  --navy:       #0A2240;
  --navy-deep:  #060F1E;

  --bg:         #F0F2F7;
  --surface:    #FFFFFF;
  --surface-2:  #F7F9FC;
  --border:     #E2E6EF;
  --border-dim: #CDD3E0;

  --text:       #0A2240;
  --text-muted: #64748B;
  --text-faint: #94A3B8;

  --success:    #0F9B5E;
  --error:      #DC2626;
  --running:    #D97706;

  --mono: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
  --sans: 'Inter', system-ui, sans-serif;
  --display: 'Syne', sans-serif;

  --radius: 10px;
  --shadow: 0 1px 3px rgba(10,34,64,.07), 0 4px 16px rgba(10,34,64,.06);
  --shadow-lg: 0 8px 32px rgba(10,34,64,.12);
}

body.dark {
  --bg:         #080E1A;
  --surface:    #0D1526;
  --surface-2:  #101C30;
  --border:     #1A2A42;
  --border-dim: #243652;

  --text:       #E8EDF5;
  --text-muted: #8A9BBB;
  --text-faint: #4A6080;

  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.4);
}

/* ================= RESET ================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}
body { display: flex; flex-direction: column; overflow: hidden; }

/* ================= HEADER ================= */
header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  box-shadow: var(--shadow);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  user-select: none;
}

.logo-badge {
  width: 30px;
  height: 30px;
  background: linear-gradient(135deg, var(--orange) 0%, #ff7c4d 100%);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--display);
  font-size: 14px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -1px;
  box-shadow: 0 2px 8px rgba(241,90,41,.35);
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.3px;
  line-height: 1;
}
.logo-text .c { color: var(--orange); }

.header-divider {
  width: 1px;
  height: 22px;
  background: var(--border);
}

.app-title {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: .02em;
}

.header-spacer { flex: 1; }

.kbd-hint {
  font-size: 11px;
  color: var(--text-faint);
  font-family: var(--mono);
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 5px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 12px;
  border-radius: 8px;
  font-size: 12.5px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .15s ease;
  white-space: nowrap;
  letter-spacing: .01em;
}

.btn-ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--text-muted);
}
.btn-ghost:hover {
  background: var(--surface-2);
  border-color: var(--border-dim);
  color: var(--text);
}

.btn-icon {
  width: 32px;
  padding: 0;
  justify-content: center;
  font-size: 15px;
}

.btn-run {
  background: linear-gradient(135deg, var(--orange) 0%, #ff6b35 100%);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 2px 8px rgba(241,90,41,.3);
  min-width: 90px;
  justify-content: center;
}
.btn-run:hover {
  background: linear-gradient(135deg, var(--orange-dim) 0%, #e05a28 100%);
  box-shadow: 0 4px 14px rgba(241,90,41,.4);
  transform: translateY(-1px);
}
.btn-run:active { transform: translateY(0); }

.btn-run.running {
  animation: pulse-run 1.2s ease-in-out infinite;
}
@keyframes pulse-run {
  0%, 100% { box-shadow: 0 2px 8px rgba(241,90,41,.3); }
  50%       { box-shadow: 0 4px 18px rgba(241,90,41,.55); }
}

/* ================= MAIN LAYOUT ================= */
main {
  flex: 1;
  display: flex;
  min-height: 0;
  padding: 14px;
  gap: 12px;
  overflow: hidden;
}

/* ================= PANEL ================= */
.panel {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  min-width: 0;
  transition: box-shadow .2s;
  flex: 1;
}
.panel:focus-within {
  box-shadow: var(--shadow-lg), 0 0 0 2px rgba(241,90,41,.12);
  border-color: var(--border-dim);
}

.panel-header {
  height: 38px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}

.panel-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--text-faint);
  font-family: var(--mono);
  text-transform: uppercase;
  flex: 1;
}

.panel-badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--mono);
  font-weight: 600;
  letter-spacing: .03em;
}

.badge-payload { background: rgba(37,99,235,.1); color: #3B82F6; }
.badge-script  { background: rgba(241,90,41,.1); color: var(--orange); }
.badge-output  { background: rgba(16,185,129,.1); color: var(--success); }

.panel-action {
  height: 24px;
  padding: 0 8px;
  font-size: 11px;
  border-radius: 5px;
  font-family: var(--mono);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
}
.panel-action:hover {
  border-color: var(--orange);
  color: var(--orange);
  background: rgba(241,90,41,.05);
}

/* ================= CODE AREAS ================= */
.editor-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
}

textarea, pre {
  width: 100%;
  height: 100%;
  border: 0;
  outline: none;
  padding: 16px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.7;
  background: var(--surface);
  color: var(--text);
  resize: none;
  display: block;
  tab-size: 2;
}

textarea::placeholder { color: var(--text-faint); }

pre {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-all;
  overflow: auto;
  transition: color .2s;
}

pre.empty { color: var(--text-faint); font-style: italic; }

/* Line numbers illusion via counter */
.editor-wrap textarea {
  padding-left: 16px;
}

/* ================= PANEL FOOTER ================= */
.panel-footer {
  height: 38px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
  flex-shrink: 0;
}

.footer-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
}

.mime-select {
  height: 24px;
  padding: 0 6px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 11px;
  font-family: var(--mono);
  cursor: pointer;
  outline: none;
  transition: border-color .15s;
}
.mime-select:hover, .mime-select:focus { border-color: var(--orange); }

.status-chip {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11.5px;
  font-weight: 600;
  font-family: var(--mono);
  padding: 3px 10px;
  border-radius: 20px;
  transition: all .2s;
  letter-spacing: .01em;
}
.status-chip.ready   { background: var(--surface); border: 1px solid var(--border); color: var(--text-faint); }
.status-chip.ok      { background: rgba(15,155,94,.1); border: 1px solid rgba(15,155,94,.2); color: var(--success); }
.status-chip.err     { background: rgba(220,38,38,.08); border: 1px solid rgba(220,38,38,.2); color: var(--error); }
.status-chip.running { background: rgba(217,119,6,.1); border: 1px solid rgba(217,119,6,.2); color: var(--running); }

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.status-chip.running .status-dot {
  animation: blink .8s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; } 50% { opacity: .3; }
}

.footer-hint {
  font-size: 10.5px;
  color: var(--text-faint);
  font-family: var(--mono);
}

/* ================= RESIZER ================= */
.gutter {
  width: 5px;
  cursor: col-resize;
  flex-shrink: 0;
  border-radius: 3px;
  background: transparent;
  transition: background .15s;
  position: relative;
}
.gutter::after {
  content: '';
  position: absolute;
  inset: 0 1px;
  border-radius: 3px;
  background: var(--border);
  transition: background .15s;
}
.gutter:hover::after, .gutter.dragging::after {
  background: var(--orange);
}

/* ================= API DRAWER ================= */
.api-drawer {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  height: 65vh;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -8px 40px rgba(0,0,0,.15);
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  display: flex;
  flex-direction: column;
  z-index: 1000;
}
.api-drawer.open { transform: translateY(0); }

.api-drawer-header {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.api-drawer-title {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.drawer-handle {
  width: 36px;
  height: 4px;
  background: var(--border-dim);
  border-radius: 2px;
  position: absolute;
  left: 50%;
  top: 10px;
  transform: translateX(-50%);
}

.api-drawer-body { flex: 1; min-height: 0; }
.api-iframe { width: 100%; height: 100%; border: none; }

/* ================= OVERLAY ================= */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
  z-index: 999;
  backdrop-filter: blur(2px);
}
.overlay.active { opacity: 1; pointer-events: all; }

/* ================= SCROLL ================= */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.panel { animation: fadeIn .25s ease both; }
.panel:nth-child(1) { animation-delay: .04s; }
.panel:nth-child(3) { animation-delay: .08s; }
.panel:nth-child(5) { animation-delay: .12s; }


.o-left {
  color: var(--orange);
  clip-path: inset(0 50% 0 0);
  position: relative;
}

.o-right {
  color: var(--text);
  clip-path: inset(0 0 0 50%);
  margin-left: -0.52em;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="logo">
    <div class="logo-text"><span class="c">C</span><span class="o-left">o</span><span class="o-right">o</span>forge</div>
  </div>

  <div class="header-divider"></div>
  <div class="app-title">DataWeave Playground</div>

  <div class="header-spacer"></div>

  <span class="kbd-hint">Ctrl+Enter to run</span>

  <div class="header-actions">
    <button class="btn btn-ghost" onclick="openApi()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
      API Reference
    </button>
    <button class="btn btn-ghost btn-icon" id="themeToggle" title="Toggle theme">🌙</button>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main id="mainLayout">

  <!-- PAYLOAD PANEL -->
  <section class="panel" id="panelPayload">
    <div class="panel-header">
      <span class="panel-label">Payload</span>
      <span class="panel-badge badge-payload">JSON</span>
    </div>
    <div class="editor-wrap">
      <textarea id="input" spellcheck="false" placeholder='{ "key": "value" }'>{ "message": "Hello world!" }</textarea>
    </div>
    <div class="panel-footer">
      <label class="footer-label" for="inputMime">MIME</label>
      <select id="inputMime" class="mime-select" title="Input MIME type">
        <option value="application/json">application/json</option>
        <option value="application/xml">application/xml</option>
        <option value="application/csv">application/csv</option>
        <option value="application/yaml">application/yaml</option>
        <option value="text/plain">text/plain</option>
      </select>
    </div>
  </section>

  <div class="gutter" id="gutter1"></div>

  <!-- SCRIPT PANEL -->
  <section class="panel" id="panelScript">
    <div class="panel-header">
      <span class="panel-label">Script</span>
      <span class="panel-badge badge-script">DW 2.0</span>
      <button class="panel-action" onclick="copyText('script',this)">Copy</button>
    </div>
    <div class="editor-wrap">
      <textarea id="script" spellcheck="false">%dw 2.0
output application/json
---
payload</textarea>
    </div>
    <div class="panel-footer">
      <button class="btn btn-run" id="runBtn">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><path d="M2 1.5l9 4.5-9 4.5V1.5z"/></svg>
        Run
      </button>
      <div class="status-chip ready" id="statusChip">
        <span class="status-dot"></span>
        <span id="statusText">Ready</span>
      </div>
    </div>
  </section>

  <div class="gutter" id="gutter2"></div>

  <!-- OUTPUT PANEL -->
  <section class="panel" id="panelOutput">
    <div class="panel-header">
      <span class="panel-label">Output</span>
      <span class="panel-badge badge-output" id="outputBadge">—</span>
      <button class="panel-action" onclick="copyText('output',this)">Copy</button>
    </div>
    <div class="editor-wrap">
      <pre id="output" class="empty">Run the script to see output…</pre>
    </div>
    <div class="panel-footer">
      <span class="footer-hint">Rendered locally · No data sent</span>
    </div>
  </section>

</main>

<!-- ===== OVERLAY ===== -->
<div class="overlay" id="overlay" onclick="closeApi()"></div>

<!-- ===== API DRAWER ===== -->
<div id="apiDrawer" class="api-drawer">
  <div class="drawer-handle"></div>
  <div class="api-drawer-header">
    <span class="api-drawer-title">API Reference</span>
    <button class="btn btn-ghost btn-icon" onclick="closeApi()" title="Close">✕</button>
  </div>
  <div class="api-drawer-body">
    <iframe class="api-iframe" src="/docs"></iframe>
  </div>
</div>

<script>
/* ===== UTILITIES ===== */
const $ = s => document.querySelector(s);

function toBase64Utf8(str) {
  const b = new TextEncoder().encode(str);
  let r = ""; b.forEach(x => r += String.fromCharCode(x));
  return btoa(r);
}

function prettyJson(t) { try { return JSON.stringify(JSON.parse(t), null, 2); } catch { return t; } }
function prettyXml(x) {
  try {
    x = x.replace(/(>)(<)(\/*)/g, '$1\n$2$3');
    let p = 0, o = '';
    x.split('\n').forEach(n => {
      if (n.match(/^<\/\w/)) p--;
      o += '  '.repeat(Math.max(0, p)) + n + '\n';
      if (n.match(/^<\w[^>]*[^\/]>$/)) p++;
    });
    return o.trim();
  } catch { return x; }
}

/* ===== STATUS ===== */
const chip = $('#statusChip'), statusText = $('#statusText');
function setStatus(state, label) {
  chip.className = 'status-chip ' + state;
  statusText.textContent = label;
}

/* ===== RUN ===== */
async function runPlayground() {
  const out = $('#output');
  setStatus('running', 'Running…');
  $('#runBtn').classList.add('running');
  out.className = '';

  try {
    const r = await fetch('/api/run', {
      method: 'POST',
      headers: {
        'Content-Type': $('#inputMime').value,
        'dw-script-b64': toBase64Utf8($('#script').value)
      },
      body: $('#input').value
    });
    const ct = (r.headers.get('content-type') || '').toLowerCase();
    const t = await r.text();
    const pretty =
      ct.includes('json') ? prettyJson(t) :
      (ct.includes('xml') || t.trim().startsWith('<')) ? prettyXml(t) :
      t.trim();
    out.textContent = pretty;
    $('#outputBadge').textContent = ct.includes('json') ? 'JSON' : ct.includes('xml') ? 'XML' : ct.includes('csv') ? 'CSV' : 'TEXT';
    setStatus('ok', 'Success');
  } catch (e) {
    out.textContent = String(e);
    out.className = 'err';
    setStatus('err', 'Error');
  }
  $('#runBtn').classList.remove('running');
}

/* Auto-run on edit */
let timer = null;
['input', 'script'].forEach(id => {
  $('#' + id).addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(runPlayground, 600);
  });
});
$('#runBtn').onclick = runPlayground;

/* Ctrl+Enter shortcut */
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runPlayground();
  }
});

/* ===== COPY ===== */
function copyText(id, btn) {
  const el = $('#' + id);
  navigator.clipboard.writeText(el.value || el.innerText);
  const orig = btn.textContent;
  btn.textContent = '✓ Copied';
  setTimeout(() => btn.textContent = orig, 1200);
}

/* ===== THEME ===== */
const toggle = $('#themeToggle');
function setTheme(m) {
  document.body.classList.toggle('dark', m === 'dark');
  toggle.textContent = m === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', m);
}
toggle.onclick = () => setTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
setTheme(localStorage.getItem('theme') || 'light');

/* ===== API DRAWER ===== */
const drawer = $('#apiDrawer'), overlay = $('#overlay');
function openApi()  { drawer.classList.add('open');  overlay.classList.add('active'); }
function closeApi() { drawer.classList.remove('open'); overlay.classList.remove('active'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeApi(); });

/* ===== RESIZER ===== */
function makeResizer(gutterId, panelAId, panelBId) {
  const gutter = $('#' + gutterId);
  const layout = $('#mainLayout');
  let dragging = false, startX, startA, startB;

  gutter.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startA = $('#' + panelAId).getBoundingClientRect().width;
    startB = $('#' + panelBId).getBoundingClientRect().width;
    gutter.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientX - startX;
    const newA = Math.max(160, startA + delta);
    const newB = Math.max(160, startB - delta);
    $('#' + panelAId).style.flex = 'none';
    $('#' + panelAId).style.width = newA + 'px';
    $('#' + panelBId).style.flex = 'none';
    $('#' + panelBId).style.width = newB + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      gutter.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
}

makeResizer('gutter1', 'panelPayload', 'panelScript');
makeResizer('gutter2', 'panelScript', 'panelOutput');

/* MIME badge sync */
$('#inputMime').addEventListener('change', e => {
  const v = e.target.value.split('/')[1].toUpperCase();
  document.querySelector('.badge-payload').textContent = v;
});
</script>
</body>
</html>
